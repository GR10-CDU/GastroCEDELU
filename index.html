
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Informe Endoscópico</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  margin:0;
  padding:0;
}

.pagina{
  width:210mm;
  height:297mm;
  padding:15mm 18mm;
  box-sizing:border-box;
  position:relative;
  page-break-after:always;
}

.header{
  text-align:center;
  font-size:20px;
  font-weight:600;
  margin-bottom:10px;
}

.datos{
  font-size:13px;
  margin-bottom:8px;
}

.informe-endoscopico{
  font-size:13px;
  line-height:1;
  margin-top:8px;
  margin-bottom:10px;
}

.galeria{
  display:grid;
  grid-template-columns: repeat(4, 4cm);
  grid-auto-rows:4cm;
  justify-content:center;
  gap:5px;
  margin-top:10px;
}

.galeria img{
  width:4cm;
  height:4cm;
  object-fit:cover;
  border:1px solid #ccc;
}

.firma{
  text-align:center;
  margin-top:15px;
}

.firma img{
  width:180px;
}

.firma-texto{
  text-align:center;
  font-size:13px;
  margin-top:4px;
}

.footer{
  position:absolute;
  bottom:10px;
  left:0;
  width:100%;
  text-align:center;
  font-size:11px;
  color:#555;
}
</style>
</head>

<body>

<div id="contenedor"></div>

<script>

const imagenes = [
"img1.jpg","img2.jpg","img3.jpg","img4.jpg",
"img5.jpg","img6.jpg","img7.jpg","img8.jpg",
"img9.jpg","img10.jpg","img11.jpg"
];

const MAX_POR_PAGINA = 8;
const contenedor = document.getElementById("contenedor");

for(let i=0;i<imagenes.length;i+=MAX_POR_PAGINA){

    const pagina = document.createElement("div");
    pagina.className = "pagina";

    pagina.innerHTML = `
        <div class="header">INFORME ENDOSCÓPICO</div>

        <div class="datos">
        <b>Paciente:</b> ___________________________<br>
        <b>Edad:</b> ____ años<br>
        <b>Endoscopia:</b> _________________________
        </div>

        <div class="informe-endoscopico">
        Texto del informe endoscópico.
        </div>

        <div class="galeria"></div>

        <div class="firma">
            <img src="Firma Lorena NOTARI.jpeg">
        </div>

        <div class="firma-texto">
            <b>Dra Lorena Notari</b><br>
            MP 12.710<br>
            MN 126.095
        </div>

        <div class="footer">
            Sistema de Informes Endoscópicos
        </div>
    `;

    const galeria = pagina.querySelector(".galeria");

    imagenes.slice(i, i+MAX_POR_PAGINA).forEach(img=>{
        const image = document.createElement("img");
        image.src = img;
        galeria.appendChild(image);
    });

    contenedor.appendChild(pagina);
}

</script>

</body>
</html>
